bioguide: nyc_mayor_042026 #TODO: use naming convention to rename each new file
contact_form:
  method: POST
  action: "https://apps.nyc.gov/nyc-mailform/validation"
  steps:
    - visit: "https://www.nyc.gov/mayors-office/contact-the-mayor"
    - find:
        - selector: "#form-button-1802421075"
    - javascript: 
      - value: "Array.prototype.forEach.call(document.querySelectorAll('style,[rel=\"stylesheet\"],[type=\"text/css\"]'), function(element){ try{ element.parentNode.removeChild(element) } catch(err){} });"
    - fill_in:
        - name: FIRST
          selector: "input[name='FIRST']"
          value: $NAME_FIRST
          required: true
        - name: LAST
          selector: "input[name='LAST']"
          value: $NAME_LAST
          required: true
        - name: ADDR1
          selector: "input[name='ADDR1']"
          value: $ADDRESS_STREET
          required: true
        - name: CITY
          selector: "input[name='CITY']"
          value: $ADDRESS_CITY
          required: true
        - name: ZIP
          selector: "input[name='ZIP']"
          value: $ADDRESS_ZIP5
          required: true
        - name: EMAIL
          selector: "input[name='EMAIL']"
          value: $EMAIL
          required: true
        - name: MSG
          selector: "textarea[name='MSG']"
          value: $MESSAGE
          required: true
          max_length: 500
    - select:
        - name: Topic
          selector: "select[name='Topic']"
          value: $TOPIC
          required: true
          options:
            General Views: VIEWS
    - wait:
        - value: 5 
    - javascript:
        - value: document.querySelector("#g-recaptcha-response-100000").style.display = "block";
    - javascript:
        - value: document.querySelector("#g-recaptcha-response").style.display = "block";
    - javascript:
        - value: var field = document.querySelector("textarea[name='g-recaptcha-response']"); field.style.display = "block"; field.style.visibility = "visible"; field.removeAttribute("disabled"); document.querySelector("#form-contact-the-mayor").appendChild(temp1); field.value = "$RECAPTCHA_TOKEN";
    - javascript:
        - value: var field = document.querySelector("textarea[name='g-recaptcha-response']"); field.dispatchEvent(new Event('change', { bubbles: true })); field.dispatchEvent(new Event('input', { bubbles: true }));
    - recaptcha:
        - value: true
    - click_on:
        - selector: ".form-button-1802421075"
  success:
    headers:
      status: 200
    body:
      contains: "Your message has been received. Thank you for contacting my office."